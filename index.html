<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Water System SCADA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f4f8; }
        .header {
            background: #1a252f;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .header h1 { font-size: 1rem; letter-spacing: 1px; text-transform: uppercase; }
        #sync-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 12px;
            background: #34495e;
            transition: background 0.4s;
        }
        #cy { width: 100vw; height: calc(100vh - 50px); display: block; }
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 0.8rem;
            z-index: 10;
        }
        .legend h4 { margin-bottom: 8px; color: #333; font-size: 0.85rem; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
        .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
        .dot-square { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="header">
    <h1>🌊 Water Project — Operational Diagram</h1>
    <div id="sync-status">Initializing...</div>
</div>

<div id="cy"></div>

<div class="legend">
    <h4>Legend</h4>
    <div class="legend-item"><div class="dot" style="background:#2ecc71"></div> Valve OPEN</div>
    <div class="legend-item"><div class="dot" style="background:#e74c3c"></div> Valve CLOSED</div>
    <div class="legend-item"><div class="dot-square" style="background:#3498db"></div> Zone ACTIVE</div>
    <div class="legend-item"><div class="dot-square" style="background:#95a5a6"></div> Zone INACTIVE</div>
    <div class="legend-item">
        <div style="width:28px;height:4px;background:#2ecc71;border-radius:2px;flex-shrink:0"></div>
        Active Flow
    </div>
    <div class="legend-item">
        <div style="width:28px;height:4px;background:#3498db;border-radius:2px;flex-shrink:0"></div>
        Pipe
    </div>
</div>

<script>
    // ─── CONFIG — only thing you need to change ───────────────────────────────
    const GITHUB_USERNAME = 'bluebeardtitan';
    const GIST_ID         = 'a6ff5a8f656b7736aa2ac6b3eef9907f';
    const GIST_FILE       = 'myproj_status.json';

    // Raw Gist URL — has CORS headers, no proxy needed
    const API_URL = `https://gist.githubusercontent.com/${GITHUB_USERNAME}/${GIST_ID}/raw/${GIST_FILE}`;

    const REFRESH_INTERVAL_MS = 20000;
    // ─────────────────────────────────────────────────────────────────────────

    // ─── SVG ICONS ────────────────────────────────────────────────────────────
    const makeSVG = (svgContent) =>
        'data:image/svg+xml;utf8,' + encodeURIComponent(svgContent);

    const svgValveOn = makeSVG(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <polygon points="32,4 8,56 14,60 32,48 50,60 56,56"
                fill="#2ecc71" stroke="#ffffff" stroke-width="2"/>
            <rect x="29" y="4" width="6" height="24" rx="2" fill="#27ae60"/>
        </svg>`);

    const svgValveOff = makeSVG(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <polygon points="32,4 8,56 14,60 32,48 50,60 56,56"
                fill="#e74c3c" stroke="#ffffff" stroke-width="2"/>
            <rect x="29" y="4" width="6" height="24" rx="2" fill="#c0392b"/>
        </svg>`);

    const svgZoneOn = makeSVG(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <rect x="6" y="18" width="52" height="36" rx="5"
                fill="#3498db" stroke="#ffffff" stroke-width="2"/>
            <rect x="22" y="8" width="20" height="14" rx="3"
                fill="#2980b9" stroke="#ffffff" stroke-width="2"/>
            <rect x="10" y="28" width="44" height="4" rx="2"
                fill="rgba(255,255,255,0.3)"/>
        </svg>`);

    const svgZoneOff = makeSVG(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
            <rect x="6" y="18" width="52" height="36" rx="5"
                fill="#95a5a6" stroke="#ffffff" stroke-width="2"/>
            <rect x="22" y="8" width="20" height="14" rx="3"
                fill="#7f8c8d" stroke="#ffffff" stroke-width="2"/>
            <rect x="10" y="28" width="44" height="4" rx="2"
                fill="rgba(255,255,255,0.2)"/>
        </svg>`);
    // ─────────────────────────────────────────────────────────────────────────

    // ─── CYTOSCAPE INIT ───────────────────────────────────────────────────────
    var cy = cytoscape({
        container: document.getElementById('cy'),
        style: [
            {
                selector: 'node',
                style: {
                    'label': 'data(label)',
                    'width': 54, 'height': 54,
                    'background-opacity': 0,
                    'background-image': svgValveOff,
                    'background-fit': 'contain',
                    'font-size': '11px',
                    'font-weight': 'bold',
                    'text-wrap': 'wrap',
                    'text-max-width': '110px',
                    'text-valign': 'bottom',
                    'text-margin-y': 6,
                    'color': '#2c3e50'
                }
            },
            { selector: 'node[type="valve"][state="ON"]',  style: { 'background-image': svgValveOn } },
            { selector: 'node[type="valve"][state="OFF"]', style: { 'background-image': svgValveOff } },
            { selector: 'node[type="zone"][state="ON"]',   style: { 'background-image': svgZoneOn,  'width': 64, 'height': 64 } },
            { selector: 'node[type="zone"][state="OFF"]',  style: { 'background-image': svgZoneOff, 'width': 64, 'height': 64 } },
            {
                selector: 'edge',
                style: {
                    'width': 4,
                    'line-color': '#3498db',
                    'target-arrow-shape': 'triangle',
                    'target-arrow-color': '#3498db',
                    'curve-style': 'bezier',
                    'label': 'data(label)',
                    'font-size': '9px',
                    'edge-text-rotation': 'autorotate',
                    'text-background-opacity': 1,
                    'text-background-color': '#f0f4f8',
                    'text-background-padding': '2px'
                }
            },
            {
                selector: 'edge[flow="active"]',
                style: {
                    'line-color': '#2ecc71',
                    'target-arrow-color': '#2ecc71',
                    'width': 5
                }
            }
        ],
        elements: {
            nodes: [
                { data: { id: 'V1',     type: 'valve', state: 'OFF', label: 'V1\nInlet'   }, position: { x: 100, y: 150 } },
                { data: { id: 'V2',     type: 'valve', state: 'OFF', label: 'V2\nBooster' }, position: { x: 400, y: 150 } },
                { data: { id: 'Zone_A', type: 'zone',  state: 'ON',  label: 'Zone A'      }, position: { x: 250, y: 350 } }
            ],
            edges: [
                { data: { id: 'P1', source: 'V1', target: 'Zone_A', label: 'Main',   flow: '' } },
                { data: { id: 'P2', source: 'V2', target: 'Zone_A', label: 'Bypass', flow: '' } }
            ]
        },
        layout: { name: 'preset' },
        userZoomingEnabled: true,
        userPanningEnabled: true
    });

    cy.on('tap', 'node', function(evt) {
        const n = evt.target;
        console.log(`[TAP] id=${n.id()} type=${n.data('type')} state=${n.data('state')}`);
    });
    // ─────────────────────────────────────────────────────────────────────────

    // ─── REFRESH LOOP ─────────────────────────────────────────────────────────
    async function refreshData() {
        const statusEl = document.getElementById('sync-status');
        statusEl.innerText = 'Syncing...';
        statusEl.style.background = '#34495e';
        try {
            // Add cache-busting so browser doesn't serve stale Gist content
            const res = await fetch(API_URL + '?t=' + Date.now());
            if (!res.ok) throw new Error(`HTTP ${res.status}`);

            const data = await res.json();
            if (data.error) throw new Error('Sheet error: ' + data.error);

            let updated = 0;
            data.forEach(item => {
                const el = cy.getElementById(item.id);
                if (el.length === 0) return;
                if (item.state !== undefined) el.data('state', item.state.toString().toUpperCase());
                if (item.label !== undefined) el.data('label', item.label.toString());
                if (item.type  !== undefined) el.data('type',  item.type.toString().toLowerCase());
                if (item.flow  !== undefined) el.data('flow',  item.flow.toString().toLowerCase());
                updated++;
            });

            cy.style().update();

            statusEl.innerText = `✓ Synced ${new Date().toLocaleTimeString()} (${updated} elements)`;
            statusEl.style.background = '#27ae60';

        } catch (err) {
            console.error('Sync error:', err);
            statusEl.innerText = `⚠ ${err.message}`;
            statusEl.style.background = '#c0392b';
        }
    }

    refreshData();
    setInterval(refreshData, REFRESH_INTERVAL_MS);
    // ─────────────────────────────────────────────────────────────────────────
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <title>Water System Operational Diagram</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        #cy { width: 100vw; height: 90vh; display: block; }
        .header { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #sync-status { font-size: 0.8em; background: #34495e; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div>Water Project: Operational Diagram</div>
        <div id="sync-status">Initializing...</div>
    </div>
    
    <div id="cy"></div>

<script>
    // PASTE YOUR NEW WEB APP URL HERE
    const API_URL = 'https://script.google.com/macros/s/AKfycbzE5sI5yKTYDElO1vRmhu_v_9o0Rs7dnnq1WNbOtHq8FQQ-DqeqBfAU5nZspswbmsaWbQ/exec';

    const svgValveOn = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%232ecc71"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>');
    const svgValveOff = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23e74c3c"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>');

    var cy = cytoscape({
        container: document.getElementById('cy'),
        style: [
            {
                selector: 'node',
                style: {
                    'label': 'data(label)',
                    'width': 50, 'height': 50,
                    'background-opacity': 0,
                    'background-image': svgValveOff,
                    'background-fit': 'contain',
                    'font-size': '10px',
                    'text-wrap': 'wrap',
                    'text-max-width': '100px',
                    'text-valign': 'bottom',
                    'text-margin-y': 5
                }
            },
            { selector: 'node[state="ON"]', style: { 'background-image': svgValveOn } },
            {
                selector: 'edge',
                style: {
                    'width': 4, 'line-color': '#3498db',
                    'target-arrow-shape': 'triangle',
                    'target-arrow-color': '#3498db',
                    'curve-style': 'bezier',
                    'label': 'data(label)',
                    'font-size': '9px',
                    'edge-text-rotation': 'autorotate',
                    'text-background-opacity': 1,
                    'text-background-color': '#ffffff'
                }
            }
        ],
        elements: {
            nodes: [
                { data: { id: 'V1', state: 'OFF', label: 'V1' }, position: { x: 100, y: 100 } },
                { data: { id: 'V2', state: 'OFF', label: 'V2' }, position: { x: 400, y: 100 } },
                { data: { id: 'Zone_A', state: 'ON', label: 'Zone A' }, position: { x: 250, y: 300 } }
            ],
            edges: [
                { data: { id: 'P1', source: 'V1', target: 'Zone_A', label: '' } },
                { data: { id: 'P2', source: 'V2', target: 'Zone_A', label: '' } }
            ]
        }
    });

    async function refreshData() {
        const statusEl = document.getElementById('sync-status');
        try {
            // Using {redirect: 'follow'} is the secret for Google Apps Script
            const response = await fetch(API_URL, { redirect: 'follow' });
            if (!response.ok) throw new Error('Network response was not ok');
            
            const data = await response.json();
            
            data.forEach(item => {
                const el = cy.getElementById(item.id);
                if (el.length > 0) {
                    if (item.state) el.data('state', item.state.toUpperCase());
                    if (item.label) el.data('label', item.label);
                }
            });

            statusEl.innerText = "Synced: " + new Date().toLocaleTimeString();
            statusEl.style.background = "#27ae60";
        } catch (err) {
            console.error("Fetch Error:", err);
            statusEl.innerText = "Sync Error - Check Console";
            statusEl.style.background = "#c0392b";
        }
    }

    // Run every 20 seconds
    refreshData();
    setInterval(refreshData, 20000);
</script>
</body>
</html>
